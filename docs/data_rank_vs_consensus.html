<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rank vs Consensus Data Access</title>
  <style>
    :root {
      --bg: #f3efe7;
      --paper: #ffffff;
      --ink: #141414;
      --line: #1f2933;
      --accent: #0f4c5c;
      --muted: #5a6772;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 1rem; font-family: Arial, sans-serif; color: var(--ink); background: var(--bg); }
    .card { max-width: 900px; margin: 0 auto; background: var(--paper); border: 1px solid var(--line); padding: 1rem; }
    h1 { margin: 0 0 0.5rem; }
    p { color: var(--muted); }
    .row { margin: 0.7rem 0; }
    .btn { display: inline-block; margin-right: 0.5rem; margin-top: 0.4rem; padding: 0.45rem 0.7rem; border: 1px solid var(--line); text-decoration: none; color: var(--ink); background: #f8fafb; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    code { display: block; padding: 0.55rem; border: 1px solid #ccd3d9; background: #f7f9fa; word-break: break-all; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Rank vs Consensus CSV</h1>
    <p>Raw CSV downloads are disabled in public mode. This page is now view-only.</p>
    <div class="row">
      <a class="btn" href="index.html">Back To Hub</a>
    </div>
    <div class="row">
      <strong>Access</strong>
      <code>Public read-only mode enabled. Owner/admin access required for raw data files.</code>
    </div>
  </main>
</body>
</html>
